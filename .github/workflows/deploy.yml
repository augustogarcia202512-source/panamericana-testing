jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Forzamos el uso de las últimas versiones estables
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Mantenemos tu proyecto en Node 24
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar proyecto
        run: npm run build

      # Actualizado a la última versión para evitar conflictos con Node 24
      - name: Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
